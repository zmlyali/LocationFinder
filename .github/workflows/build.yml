name: Build LocationHelper.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: .NET 8 SDK kur
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build ve Publish
        run: |
          dotnet publish LocationHelper.csproj `
            -r win-x64 `
            -c Release `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableWindowsTargeting=true `
            -o ./output

      - name: Exe dosyasini indir
        uses: actions/upload-artifact@v4
        with:
          name: LocationHelper-win-x64
          path: ./output/LocationHelper.exe
          retention-days: 30
